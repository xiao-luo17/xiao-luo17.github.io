eral">null</span>;<br><br>		<span class="hljs-keyword">if</span> (args.length != <span class="hljs-number">1</span>) &#123;<br>			stdErr.println(<span class="hljs-string">&quot;Usage: java GourmetCoffee filename&quot;</span>);<br>		&#125; <span class="hljs-keyword">else</span> &#123;<br>			<span class="hljs-keyword">try</span> &#123;<br>				catalog = (<span class="hljs-keyword">new</span> <span class="hljs-title class_">FileCatalogLoader</span>()).loadCatalog(args[<span class="hljs-number">0</span>]);<br><br>			&#125; <span class="hljs-keyword">catch</span> (FileNotFoundException fnfe) &#123;<br>				stdErr.println(<span class="hljs-string">&quot;The file does not exist&quot;</span>);<br><br>				System.exit(<span class="hljs-number">1</span>);<br><br>			&#125; <span class="hljs-keyword">catch</span> (DataFormatException dfe) &#123;<br>				stdErr.println(<span class="hljs-string">&quot;The file contains malformed data: &quot;</span><br>				               + dfe.getMessage());<br><br>				System.exit(<span class="hljs-number">1</span>);<br>			&#125;<br><br>			<span class="hljs-type">GourmetCoffee</span>  <span class="hljs-variable">application</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">new</span>  <span class="hljs-title class_">GourmetCoffee</span>(catalog);<br><br>			application.run();<br>		&#125;<br>	&#125;<br><br>	<span class="hljs-comment">/**</span><br><span class="hljs-comment">	 * Constructs a &lt;code&gt;GourmetCoffee&lt;/code&gt; object.</span><br><span class="hljs-comment">	 * Initializes the catalog data with the value specified</span><br><span class="hljs-comment">	 * in the parameter.</span><br><span class="hljs-comment">	 *</span><br><span class="hljs-comment">	 * <span class="hljs-doctag">@param</span> initialCatalog a product catalog</span><br><span class="hljs-comment">	 */</span><br>	<span class="hljs-keyword">private</span> <span class="hljs-title function_">GourmetCoffee</span><span class="hljs-params">(Catalog initialCatalog)</span> &#123;<br><br>		catalog = initialCatalog;<br>		sales = <span class="hljs-keyword">new</span> <span class="hljs-title class_">Sales</span>();<br>		salesFormatter = PlainTextSalesFormatter.getSingletonInstance();<br><br>		loadSales();<br>	&#125;<br><br>	<span class="hljs-comment">/**</span><br><span class="hljs-comment">	 * Initializes the sales object.</span><br><span class="hljs-comment">	 */</span><br>	<span class="hljs-keyword">private</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">loadSales</span><span class="hljs-params">()</span> &#123;<br>		<span class="hljs-type">Order</span> <span class="hljs-variable">orderOne</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Order</span>();<br>		<span class="hljs-type">Product</span> <span class="hljs-variable">productOne</span> <span class="hljs-operator">=</span> catalog.getProduct(<span class="hljs-string">&quot;C001&quot;</span>);<br>		<br>		<span class="hljs-keyword">if</span> (productOne != <span class="hljs-literal">null</span>) &#123;<br>			orderOne.addItem(<span class="hljs-keyword">new</span> <span class="hljs-title class_">OrderItem</span>(productOne, <span class="hljs-number">5</span>));<br>			sales.addOrder(orderOne);<br>		&#125;<br><br>		<span class="hljs-type">Order</span> <span class="hljs-variable">orderTwo</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Order</span>();<br>		<span class="hljs-type">Product</span> <span class="hljs-variable">productTwo</span> <span class="hljs-operator">=</span> catalog.getProduct(<span class="hljs-string">&quot;C002&quot;</span>);<br>		<span class="hljs-type">Product</span> <span class="hljs-variable">productThree</span> <span class="hljs-operator">=</span> catalog.getProduct(<span class="hljs-string">&quot;A001&quot;</span>);<br><br>		<span class="hljs-keyword">if</span> ((productTwo != <span class="hljs-literal">null</span>) &amp;&amp; (productThree != <span class="hljs-literal">null</span>)) &#123;<br>			orderTwo.addItem(<span class="hljs-keyword">new</span> <span class="hljs-title class_">OrderItem</span>(productTwo, <span class="hljs-number">2</span>));<br>			orderTwo.addItem(<span class="hljs-keyword">new</span> <span class="hljs-title class_">OrderItem</span>(productThree, <span class="hljs-number">2</span>));<br>			sales.addOrder(orderTwo);<br>		&#125;<br><br>		<span class="hljs-type">Order</span> <span class="hljs-variable">orderThree</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">Order</span>();<br>		<span class="hljs-type">Product</span> <span class="hljs-variable">productFour</span> <span class="hljs-operator">=</span> catalog.getProduct(<span class="hljs-string">&quot;B002&quot;</span>);<br><br>		<span class="hljs-keyword">if</span> (productFour != <span class="hljs-literal">null</span>) &#123;<br>			orderThree.addItem(<span class="hljs-keyword">new</span> <span class="hljs-title class_">OrderItem</span>(productFour, <span class="hljs-number">1</span>));<br>			sales.addOrder(orderThree);<br>		&#125;<br>	&#125;<br><br>	<span class="hljs-comment">/**</span><br><span class="hljs-comment">	 * Presents the user with a menu of options and executes the</span><br><span class="hljs-comment">	 * selected task.</span><br><span class="hljs-comment">	 */</span><br>	<span class="hljs-keyword">private</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">run</span><span class="hljs-params">()</span> <span class="hljs-keyword">throws</span> IOException  &#123;<br><br>		<span class="hljs-type">int</span>  <span class="hljs-variable">choice</span> <span class="hljs-operator">=</span> getChoice();<br><br>		<span class="hljs-keyword">while</span> (choice != <span class="hljs-number">0</span>)  &#123;<br>			<span class="hljs-keyword">if</span> (choice == <span class="hljs-number">1</span>)  &#123;<br>				displayCatalog();<br>			&#125; <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (choice == <span class="hljs-number">2</span>)  &#123;<br>				salesFormatter = PlainTextSalesFormatter.getSingletonInstance();<br>				writeFile(readFilename(), salesFormatter.formatSales(sales));<br>			&#125; <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (choice == <span class="hljs-number">3</span>)  &#123;<br>				salesFormatter = HTMLSalesFormatter.getSingletonInstance();<br>				writeFile(readFilename(), salesFormatter.formatSales(sales));<br>			&#125; <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (choice == <span class="hljs-number">4</span>)  &#123;<br>				salesFormatter = XMLSalesFormatter.getSingletonInstance();<br>				writeFile(readFilename(), salesFormatter.formatSales(sales));<br>			&#125;<br><br>			choice = getChoice();<br>		&#125;<br>	&#125;<br><br>	<span class="hljs-comment">/**</span><br><span class="hljs-comment">	 * Displays a menu of options and verifies the user&#x27;s choice.</span><br><span class="hljs-comment">	 *</span><br><span class="hljs-comment">	 * <span class="hljs-doctag">@return</span> an integer in the range [0,7]</span><br><span class="hljs-comment">	 */</span><br>	<span class="hljs-keyword">private</span> <span class="hljs-type">int</span>  <span class="hljs-title function_">getChoice</span><span class="hljs-params">()</span> <span class="hljs-keyword">throws</span> IOException  &#123;<br><br>		<span class="hljs-type">int</span>  input;<br><br>		<span class="hljs-keyword">do</span>  &#123;<br>			<span class="hljs-keyword">try</span>  &#123;<br>				stdErr.println();<br>				stdErr.print(<span class="hljs-string">&quot;[0]  Quit\n&quot;</span><br>				             + <span class="hljs-string">&quot;[1]  Display Catalog\n&quot;</span><br>				             + <span class="hljs-string">&quot;[2]  Save sales (Plain Text)\n&quot;</span><br>				             + <span class="hljs-string">&quot;[3]  Save sales (HTML)\n&quot;</span><br>				             + <span class="hljs-string">&quot;[4]  Save sales (XML)\n&quot;</span><br>				             + <span class="hljs-string">&quot;choice&gt; &quot;</span>);<br>				stdErr.flush();<br><br>				input = Integer.parseInt(stdIn.readLine());<br><br>				stdErr.println();<br><br>				<span class="hljs-keyword">if</span> (<span class="hljs-number">0</span> &lt;= input &amp;&amp; <span class="hljs-number">4</span> &gt;= input)  &#123;<br>					<span class="hljs-keyword">break</span>;<br>				&#125; <span class="hljs-keyword">else</span> &#123;<br>					stdErr.println(<span class="hljs-string">&quot;Invalid choice:  &quot;</span> + input);<br>				&#125;<br>			&#125; <span class="hljs-keyword">catch</span> (NumberFormatException  nfe)  &#123;<br>				stdErr.println(nfe);<br>			&#125;<br>		&#125;  <span class="hljs-keyword">while</span> (<span class="hljs-literal">true</span>);<br><br>		<span class="hljs-keyword">return</span>  input;<br>	&#125;<br><br>	<span class="hljs-comment">/**</span><br><span class="hljs-comment">	 * Displays the catalog.</span><br><span class="hljs-comment">	 */</span><br>	<span class="hljs-keyword">private</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">displayCatalog</span><span class="hljs-params">()</span> &#123;<br><br>		<span class="hljs-type">int</span> <span class="hljs-variable">size</span> <span class="hljs-operator">=</span> catalog.getNumberOfProducts();<br><br>		<span class="hljs-keyword">if</span> (size == <span class="hljs-number">0</span>) &#123;<br>			stdErr.println(<span class="hljs-string">&quot;The catalog is empty&quot;</span>);<br>		&#125; <span class="hljs-keyword">else</span> &#123;<br>			<span class="hljs-keyword">for</span> (<span class="hljs-type">Iterator</span> <span class="hljs-variable">i</span> <span class="hljs-operator">=</span> catalog.getProductsIterator(); i.hasNext();) &#123;<br><br>				<span class="hljs-type">Product</span> <span class="hljs-variable">product</span> <span class="hljs-operator">=</span> (Product) i.next();<br><br>				stdOut.println(product.getCode() + <span class="hljs-string">&quot; &quot;</span><br>				               + product.getDescription());<br>			&#125;<br>		&#125;<br>	&#125;<br><br>	<span class="hljs-comment">/**</span><br><span class="hljs-comment">	 * Creates a new file (which has the specified name) and writes</span><br><span class="hljs-comment">	 * the specified string to the new file.</span><br><span class="hljs-comment">	 *</span><br><span class="hljs-comment">	 * <span class="hljs-doctag">@param</span> filename name of the file that will store the data</span><br><span class="hljs-comment">	 * <span class="hljs-doctag">@param</span> content data to be stored</span><br><span class="hljs-comment">	 */</span><br>	<span class="hljs-keyword">private</span> <span class="hljs-keyword">void</span> <span class="hljs-title function_">writeFile</span><span class="hljs-params">(String filename, String content)</span><br>		<span class="hljs-keyword">throws</span> IOException &#123;<br><br>		<span class="hljs-type">PrintWriter</span> <span class="hljs-variable">writer</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">new</span> <span class="hljs-title class_">PrintWriter</span>(filename);<br>		writer.println(content);<br>		writer.close();<br><br>	&#125;<br><br>	<span class="hljs-comment">/**</span><br><span class="hljs-comment">	 * Prompts the user for a filename (the name of the file that</span><br><span class="hljs-comment">	 * will store the sales information) and returns the user&#x27;s</span><br><span class="hljs-comment">	 * response.</span><br><span class="hljs-comment">	 *</span><br><span class="hljs-comment">	 * <span class="hljs-doctag">@return</span> name of a file</span><br><span class="hljs-comment">	 */</span><br>	<span class="hljs-keyword">private</span>  String <span class="hljs-title function_">readFilename<   <script>
  (function() {
    var enableLang = CONFIG.code_language.enable && CONFIG.code_language.default;
    var enableCopy = CONFIG.copy_btn;
    if (!enableLang && !enableCopy) {
      return;
    }

    function getBgClass(ele) {
      return Fluid.utils.getBackgroundLightness(ele) >= 0 ? 'code-widget-light' : 'code-widget-dark';
    }

    var copyTmpl = '';
    copyTmpl += '<div class="code-widget">';
    copyTmpl += 'LANG';
    copyTmpl += '</div>';
    jQuery('.markdown-body pre').each(function() {
      var $pre = jQuery(this);
      if ($pre.find('code.mermaid').length > 0) {
        return;
      }
      if ($pre.find('span.line').length > 0) {
        return;
      }

      var lang = '';

      if (enableLang) {
        lang = CONFIG.code_language.default;
        if ($pre[0].children.length > 0 && $pre[0].children[0].classList.length >= 2 && $pre.children().hasClass('hljs')) {
          lang = $pre[0].children[0].classList[1];
        } else if ($pre[0].getAttribute('data-language')) {
          lang = $pre[0].getAttribute('data-language');
        } else if ($pre.parent().hasClass('sourceCode') && $pre[0].children.length > 0 && $pre[0].children[0].classList.length >= 2) {
          lang = $pre[0].children[0].classList[1];
          $pre.parent().addClass('code-wrapper');
        } else if ($pre.parent().hasClass('markdown-body') && $pre[0].classList.length === 0) {
          $pre.wrap('<div class="code-wrapper"></div>');
        }
        lang = lang.toUpperCase().replace('NONE', CONFIG.code_language.default);
      }
      $pre.append(copyTmpl.replace('LANG', lang).replace('code-widget">',
        getBgClass($pre[0]) + (enableCopy ? ' code-widget copy-btn" data-clipboard-snippet><i class="iconfont icon-copy"></i>' : ' code-widget">')));

      if (enableCopy) {
        Fluid.utils.createScript('https://lib.baomitu.com/clipboard.js/2.0.10/clipboard.min.js', function() {
          var clipboard = new window.ClipboardJS('.copy-btn', {
            target: function(trigger) {
              var nodes = trigger.parentNode.childNodes;
              for (var i = 0; i < nodes.length; i++) {
                if (nodes[i].tagName === 'CODE') {
                  return nodes[i];
                }
              }
            }
          });
          clipboard.on('success', function(e) {
            e.clearSelection();
            e.trigger.innerHTML = e.trigger.innerHTML.replace('icon-copy', 'icon-success');
            setTimeout(function() {
              e.trigger.innerHTML = e.trigger.innerHTML.replace('icon-success', 'icon-copy');
            }, 2000);
          });
        });
      }
    });
  })();
</script>


  
<script>
  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/4.3.1/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };

      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));
  });
</script>
